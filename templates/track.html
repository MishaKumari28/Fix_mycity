<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Track Complaint — FixMyCity</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>

{% include 'navbar.html' %}

<div class="container py-5" style="max-width:600px">
  <div class="text-center mb-5">
    <div class="feature-icon bg-primary-subtle text-primary mx-auto mb-3" style="width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center">
      <i class="bi bi-search fs-3"></i>
    </div>
    <h2 class="fw-bold">Track Your Complaint</h2>
    <p class="text-muted">Enter your complaint ID to see the current status and history.</p>
  </div>

  <div class="card border-0 shadow-sm rounded-3 mb-4">
    <div class="card-body p-4">
      <div class="input-group">
        <span class="input-group-text bg-transparent border-end-0">
          <i class="bi bi-hash text-primary"></i>
        </span>
        <input type="text" class="form-control border-start-0 ps-0 text-uppercase"
          id="trackInput" placeholder="e.g. FMC-20250710-ABC123"
          style="letter-spacing:1px"/>
        <button class="btn btn-primary px-4 rounded-end-pill" onclick="trackComplaint()">
          <i class="bi bi-search me-1"></i>Track
        </button>
      </div>
    </div>
  </div>

  <div id="trackResult" class="d-none">
    <div class="card border-0 shadow-sm rounded-3">
      <div class="card-body p-4">
        <div class="d-flex align-items-center gap-3 mb-4">
          <div id="trackIcon" class="feature-icon bg-primary-subtle text-primary" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center">
            <i class="bi bi-check2"></i>
          </div>
          <div>
            <div class="fw-bold fs-5" id="trackId">—</div>
            <div id="trackStatusBadge"></div>
          </div>
        </div>
        <h6 class="fw-semibold mb-3">Status Timeline</h6>
        <div class="timeline" id="trackTimeline"></div>
        <div class="mt-4">
          <a id="trackDetailLink" href="#" class="btn btn-outline-primary rounded-pill px-4">
            <i class="bi bi-arrow-right me-1"></i>View Full Details
          </a>
        </div>
      </div>
    </div>
  </div>

  <div id="trackError" class="alert alert-danger d-none rounded-3 border-0">
    <i class="bi bi-exclamation-circle me-2"></i>
    Complaint not found. Please check the ID and try again.
  </div>
</div>

{% include 'footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script>
function trackComplaint() {
  const id = document.getElementById('trackInput').value.trim().toUpperCase();
  if (!id) return;
  document.getElementById('trackResult').classList.add('d-none');
  document.getElementById('trackError').classList.add('d-none');
  fetch(`/api/track/${id}`)
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      document.getElementById('trackId').textContent = data.id;
      const statusColors = {Submitted:'warning',Resolved:'success','In Progress':'primary'};
      const col = statusColors[data.status] || 'secondary';
      document.getElementById('trackStatusBadge').innerHTML =
        `<span class="badge rounded-pill bg-${col} text-${col==='warning'?'dark':'white'}">${data.status}</span>`;
      const tl = document.getElementById('trackTimeline');
      tl.innerHTML = data.history.map((h,i) => `
        <div class="timeline-item ${i===data.history.length-1?'active':''}">
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <div class="fw-medium">${h.status}</div>
            <div class="text-muted small">${h.note}</div>
            <div class="text-muted small">${h.timestamp.slice(0,16).replace('T',' ')}</div>
          </div>
        </div>`).join('');
      document.getElementById('trackDetailLink').href = `/result/${data.id}`;
      document.getElementById('trackResult').classList.remove('d-none');
    })
    .catch(() => {
      document.getElementById('trackError').classList.remove('d-none');
    });
}
document.getElementById('trackInput').addEventListener('keypress', e => { if(e.key==='Enter') trackComplaint(); });
</script>
</body>
</html>
